<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kaiju Blitz</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --green:#39d353; --green-dk:#1f7a36; --fire:#ff7a18; --ink:#eafff0;
    --dim:#8fb39c; --red:#ff5577; --gold:#ffd24a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0; overflow:hidden;}
  body{
    font-family:"Nunito",system-ui,sans-serif; color:var(--ink);
    background:radial-gradient(120% 90% at 50% 0%, #1a2f26 0%, #0e1a16 60%, #0a120f 100%);
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:560px; margin:0 auto; height:100vh; height:100dvh; display:flex; flex-direction:column;
        padding:14px; padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  #game{flex:1 1 auto; min-height:0; display:flex; flex-direction:column;}
  .playarea{flex:1 1 auto; min-height:0; display:flex; flex-direction:column; overflow:hidden;}
  h1{font-family:"Baloo 2"; text-align:center; margin:2px 0 4px; font-size:19px;
     color:var(--green); text-shadow:0 0 18px rgba(57,211,83,.45);}
  .sub{text-align:center; color:var(--dim); font-weight:800; margin:0 0 6px; font-size:14px; letter-spacing:.04em;}
  .best{text-align:center; color:var(--gold); font-weight:800; font-size:15px; margin:0 0 12px; min-height:20px;
        text-shadow:0 0 10px rgba(255,210,74,.4);}

  .opts{display:flex; flex-direction:column; gap:12px; margin-top:4px;}
  .opt-group .lbl{font-weight:800; color:var(--dim); font-size:13px; letter-spacing:.06em; margin-bottom:6px;}
  .seg{display:flex; gap:8px;}
  .seg button{
    flex:1; font-family:"Baloo 2"; font-weight:700; font-size:16px; padding:12px; cursor:pointer;
    border-radius:14px; border:2px solid #2c4a3b; background:#10211b; color:var(--ink);
  }
  .seg button.on{border-color:var(--green); background:rgba(57,211,83,.16); color:var(--green); box-shadow:0 0 14px rgba(57,211,83,.3);}
  .start-btn{
    margin-top:6px; font-family:"Baloo 2"; font-weight:800; font-size:22px; cursor:pointer;
    border:0; border-radius:16px; padding:16px; color:#06140c;
    background:linear-gradient(180deg,var(--green),var(--green-dk)); box-shadow:0 6px 0 #0e5224, 0 0 22px rgba(57,211,83,.4);
  }
  .start-btn:active{transform:translateY(3px); box-shadow:0 3px 0 #0e5224;}

  .hud{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px;}
  .stat{font-family:"Baloo 2"; font-weight:800; font-size:20px;}
  .stat small{display:block; font-size:10px; color:var(--dim); letter-spacing:.08em; font-family:"Nunito";}
  .combo{color:var(--fire); text-shadow:0 0 12px rgba(255,122,24,.5); min-width:66px; text-align:right;}
  .timebar{height:12px; border-radius:99px; background:#10211b; overflow:hidden; border:1px solid #2c4a3b;}
  .timebar>div{height:100%; background:linear-gradient(90deg,var(--green),var(--fire)); width:100%; transition:width .1s linear;}

  /* ---- battle arena ---- */
  .scene{position:relative; flex:1 1 auto; min-height:64px; margin:6px 0 2px; overflow:hidden;}
  .skyline{position:absolute; bottom:0; left:0; right:0; display:flex; align-items:flex-end; justify-content:center; gap:3px; z-index:0;}
  .bldg{font-size:26px; line-height:1; transition:transform .15s, opacity .15s; filter:grayscale(.25) brightness(.9);}
  .bldg.smashed{transform:translateY(8px) scale(.7); opacity:.3;}
  .hero,.rival{position:absolute; bottom:2px; width:80px; z-index:2;}
  .hero{left:2px;} .rival{right:2px;}
  .mon{width:100%; display:block; filter:drop-shadow(0 4px 6px rgba(0,0,0,.5));}
  .hero.stomp{animation:stomp .14s;}
  @keyframes stomp{50%{transform:translateY(-10px) scale(1.08)}}
  .rival.hit{animation:hit .18s;}
  @keyframes hit{50%{transform:translateX(9px) rotate(3deg)}}
  .rival.roar{animation:roar .3s;}
  @keyframes roar{50%{transform:scale(1.13)}}
  .rival.rise{animation:rise .4s;}
  @keyframes rise{from{transform:translateY(40px); opacity:0}to{transform:none; opacity:1}}
  .beam{position:absolute; left:80px; right:84px; bottom:54px; height:11px; border-radius:7px;
    background:linear-gradient(90deg,#63e6be,#39d353,#ffe066); opacity:0; box-shadow:0 0 16px #39d353; z-index:3;}
  .beam.on{opacity:1; animation:beamf .17s;}
  @keyframes beamf{0%{transform:scaleX(.2)}100%{transform:scaleX(1)}}
  .bosshp{position:absolute; top:-2px; left:0; right:0; height:8px; background:#3a1010; border-radius:6px; overflow:hidden; border:1px solid #5c1a1a;}
  .bosshp>div{height:100%; background:linear-gradient(90deg,#ff5577,#c92a2a); width:100%; transition:width .18s;}
  .bosscharge{position:absolute; top:8px; left:6px; right:6px; height:4px; background:#1c2b24; border-radius:4px; overflow:hidden;}
  .bosscharge>div{height:100%; background:var(--fire); width:0%;}
  .bosslabel{position:absolute; top:-20px; left:-30px; right:-30px; text-align:center; font-weight:800; font-size:11px; color:#ffb3c1; letter-spacing:.03em;}
  .dmg{position:absolute; font-family:"Baloo 2"; font-weight:800; color:var(--gold); font-size:22px; pointer-events:none;
       text-shadow:0 0 8px rgba(0,0,0,.7); z-index:4; animation:floatup .7s forwards;}
  @keyframes floatup{to{transform:translateY(-36px); opacity:0;}}
  .banner{position:absolute; top:4px; left:0; right:0; text-align:center; font-family:"Baloo 2"; font-weight:800;
           font-size:18px; color:var(--gold); text-shadow:0 0 12px rgba(255,210,74,.5); opacity:0; z-index:4;}
  .banner.on{opacity:1; animation:bannerf 1.1s;}
  @keyframes bannerf{0%{transform:scale(.7)}20%{transform:scale(1.1)}40%{transform:scale(1)}100%{opacity:1}}

  .fact{font-family:"Baloo 2"; text-align:center; font-size:40px; font-weight:800; margin:2px 0; letter-spacing:.02em; flex-shrink:0;}
  .entry{text-align:center; font-family:"Baloo 2"; font-size:38px; font-weight:800; min-height:46px; color:var(--green); flex-shrink:0;}
  .entry.bad{color:var(--red); animation:shake .25s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

  .pad{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; flex-shrink:0; padding-top:6px;}
  .pad button{
    font-family:"Baloo 2"; font-weight:800; font-size:24px; padding:10px 0; cursor:pointer;
    border-radius:14px; border:2px solid #2c4a3b; background:#15291f; color:var(--ink);
  }
  .pad button:active{background:rgba(57,211,83,.22); border-color:var(--green);}
  .pad button.zero{grid-column:2;}

  .end{text-align:center; padding-top:10px;}
  .end .big{font-size:46px;}
  .end h2{font-family:"Baloo 2"; color:var(--fire); font-size:28px; margin:6px 0 4px; text-shadow:0 0 16px rgba(255,122,24,.4);}
  .end .streakline{color:var(--dim); font-weight:800; margin:0 0 12px; font-size:14px;}
  .newbest{color:var(--gold); font-family:"Baloo 2"; font-size:20px; text-shadow:0 0 14px rgba(255,210,74,.5); margin:0 0 8px;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 auto 14px; max-width:340px;}
  .tile{background:#13241e; border:1px solid #2c4a3b; border-radius:14px; padding:11px;}
  .tile b{display:block; font-family:"Baloo 2"; font-size:26px; color:var(--green);}
  .tile span{font-size:11px; color:var(--dim); letter-spacing:.04em;}
  .save-note{color:var(--dim); font-size:13px; min-height:18px; margin:8px 0;}
  /* ---- who's playing screen ---- */
  .who{display:flex; flex-direction:column; gap:14px; margin-top:20px;}
  .who h2{font-family:"Baloo 2"; text-align:center; color:var(--ink); font-size:23px; margin:4px 0 6px;}
  .pbtn{font-family:"Baloo 2"; font-weight:800; font-size:26px; padding:22px 16px; cursor:pointer;
        border-radius:18px; border:2px solid #2c4a3b; background:#10211b; color:var(--ink);
        display:flex; flex-direction:column; align-items:center; gap:4px;}
  .pbtn small{font-size:13px; font-weight:700; color:var(--dim); letter-spacing:.03em; font-family:"Nunito";}
  .pbtn.jacob{border-color:var(--green); box-shadow:0 0 18px rgba(57,211,83,.22);}
  .pbtn.jacob small{color:var(--green);}
  .pbtn:active{transform:translateY(2px);}
  .playingas{text-align:center; color:var(--dim); font-weight:800; font-size:14px; margin:2px 0 12px;}
  .playingas b{color:var(--green);}
  .playingas a{color:var(--gold); cursor:pointer; text-decoration:underline; margin-left:8px; font-size:13px;}

  .hidden{display:none !important;}
</style>

<div class="wrap">
  <h1>🦖 KAIJU BLITZ</h1>
  <p class="best" id="best-banner">Loading record…</p>

  <!-- START -->
  <div id="start">
    <div class="opts">
      <div class="opt-group">
        <div class="lbl">WHO'S PLAYING? <span style="color:#5f7d6c;">(Test runs aren't saved)</span></div>
        <div class="seg" id="player">
          <button data-v="jacob" class="on">🦖 Jacob</button>
          <button data-v="test">🧪 Test</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="lbl">OPERATION</div>
        <div class="seg" id="op">
          <button data-v="add" class="on">＋ Add</button>
          <button data-v="sub">－ Subtract</button>
          <button data-v="mix">± Mixed</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="lbl">FACTS UP TO</div>
        <div class="seg" id="range">
          <button data-v="10">10</button>
          <button data-v="20" class="on">20</button>
        </div>
      </div>
      <div class="opt-group">
        <div class="lbl">TIME</div>
        <div class="seg" id="time">
          <button data-v="30">30s</button>
          <button data-v="60" class="on">60s</button>
          <button data-v="90">90s</button>
        </div>
      </div>
      <button class="start-btn" id="go">START RAMPAGE 🔥</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden">
    <div class="hud">
      <div class="stat" style="color:var(--green)"><span id="score">0</span><small>POINTS</small></div>
      <div class="stat"><span id="smashed">0</span><small>SMASHED</small></div>
      <div class="stat combo"><span id="combo">×1</span><small>STREAK</small></div>
      <div class="stat" style="color:var(--fire)"><span id="time-left">60</span><small>SECONDS</small></div>
    </div>
    <div class="timebar"><div id="time-fill"></div></div>

    <div class="playarea">
      <div class="scene" id="scene">
        <div class="skyline" id="skyline"></div>
        <div class="hero" id="hero"></div>
        <div class="rival hidden" id="rival"></div>
        <div class="beam" id="beam"></div>
        <div class="banner" id="banner"></div>
      </div>

      <div class="fact" id="fact">– – –</div>
      <div class="entry" id="entry">&nbsp;</div>
    </div>

    <div class="pad" id="pad">
      <button>1</button><button>2</button><button>3</button>
      <button>4</button><button>5</button><button>6</button>
      <button>7</button><button>8</button><button>9</button>
      <button class="zero">0</button>
    </div>
  </div>

  <!-- END -->
  <div id="end" class="end hidden">
    <div class="big">🦖💥</div>
    <h2>RAMPAGE OVER!</h2>
    <p class="newbest hidden" id="newbest">🏆 NEW BEST!</p>
    <p class="streakline" id="streakline"></p>
    <div class="grid">
      <div class="tile"><b id="e-correct">0</b><span>BLOCKS SMASHED</span></div>
      <div class="tile"><b id="e-points">0</b><span>POINTS</span></div>
      <div class="tile"><b id="e-acc">0%</b><span>ACCURACY</span></div>
      <div class="tile"><b id="e-pace">–</b><span>SECONDS / SMASH</span></div>
    </div>
    <p class="save-note" id="save-note"></p>
    <button class="start-btn" id="again" style="max-width:300px;margin:0 auto;display:block;">GO AGAIN 🔥</button>
  </div>
</div>

<script>
/* ====================== CONFIG ====================== */
const CONFIG = {
  webAppUrl: "https://script.google.com/macros/s/AKfycbw1HtkmkLK8f0QD0ZctRw5e_VW6W3SlqohFWQGe0xaAx-UjI-Ze9wG0DD-I4NxVfi0AwQ/exec",
  student: "Jacob",
  week: "",
  logResults: true
};
const ACTIVITY = "Math Facts — Kaiju Blitz";
const NB = 10;                // buildings per wave
const ATTACK_INTERVAL = 6;    // seconds before a boss roar breaks your streak
/* =================================================== */

const $ = id => document.getElementById(id);
const randInt = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;

let op="add", range=20, duration=60, player="jacob";

function seg(id, set){
  $(id).querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{ $(id).querySelectorAll("button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); set(b.getAttribute("data-v")); };
  });
}
seg("op", v=>op=v); seg("range", v=>range=+v); seg("time", v=>duration=+v); seg("player", v=>player=v);

/* ---- original monster artwork (all custom SVG) ---- */

  <circle cx="72" cy="40" r="5" fill="#ffe066"/><circle cx="72" cy="40" r="2" fill="#1a1a1a"/>
  <circle cx="85" cy="40" r="4.5" fill="#ffe066"/><circle cx="85" cy="40" r="1.8" fill="#1a1a1a"/>
</svg>`;}

const BOSS_NAMES = ["Crimson Brute","Violet Shrieker","Iron Maw","Trideous"];

    <polygon points="46,30 58,9 42,24" fill="#ffe3e3"/>
    <rect x="13" y="44" width="17" height="13" rx="5" fill="#f03e3e"/>
    <rect x="13" y="51" width="15" height="4" rx="2" fill="#3b0000"/>
    <circle cx="34" cy="42" r="5" fill="#fff3bf"/><circle cx="34" cy="42" r="2" fill="#1a1a1a"/>

    <circle cx="36" cy="51" r="4" fill="#ffe066"/><circle cx="36" cy="51" r="1.6" fill="#111"/>
   </svg>`;
}

/* ---- best record via JSONP ---- */
let kaijuBest = { smashed:0, secsPerCorrect:null };
function renderBestBanner(){
  $("best-banner").textContent = kaijuBest.smashed > 0
    ? `🏆 Jacob's record: ${kaijuBest.smashed} blocks` +
      (kaijuBest.secsPerCorrect ? ` · ${kaijuBest.secsPerCorrect}s each` : "") + " — beat it!"
    : "🦖 No record yet — go set one!";
}
window.__kaijuBest = function(b){ if(b && typeof b.smashed==="number") kaijuBest=b; renderBestBanner(); };
function loadBest(){
  const s=document.createElement("script");
  s.src = CONFIG.webAppUrl + "?action=best&student=" + encodeURIComponent(CONFIG.student)
        + "&activity=" + encodeURIComponent(ACTIVITY) + "&callback=__kaijuBest";
  s.onerror=()=>{ $("best-banner").textContent="🦖 Beat your best!"; };
  document.head.appendChild(s);
}

/* ---- facts ---- */
function nextFact(){
  let kind = op==="mix" ? (Math.random()<0.5?"add":"sub") : op;
  if(kind==="add"){ const a=randInt(1,range-1), b=randInt(1,range-a); return {text:`${a} + ${b}`, ans:a+b}; }
  const m=randInt(2,range), s=randInt(1,m-1); return {text:`${m} − ${s}`, ans:m-s};
}

/* ---- state ---- */
let cur, entry="", score=0, combo=0, bestCombo=0, smashed=0, correct=0, attempts=0,
    timeLeft=0, timer=null, buildings=[], factShownAt=0, totalSolveMs=0,
    phase="city", cityProgress=0, boss=null, bossSpawnCount=0, bossesDefeated=0,
    lastAnswerTs=0, bannerTimer=null;

function buildSkyline(){
  const sky=$("skyline"); sky.innerHTML=""; buildings=[];
  const icons=["🏢","🏬","🏭","🏚️","🗼","🏨"];
  for(let i=0;i<NB;i++){
    const el=document.createElement("div");
    el.className="bldg"; el.textContent=icons[i%icons.length];
    sky.appendChild(el); buildings.push(el);
  }
}
function smashNext(){
  const intact=buildings.filter(b=>!b.classList.contains("smashed"));
  if(intact[0]){ intact[0].classList.add("smashed"); intact[0].textContent="💥"; }
}
function updateHud(){ $("score").textContent=score; $("smashed").textContent=smashed; $("combo").textContent="×"+combo; }
function banner(t){ const b=$("banner"); b.textContent=t; b.classList.remove("on"); void b.offsetWidth; b.classList.add("on");
  clearTimeout(bannerTimer); bannerTimer=setTimeout(()=>b.classList.remove("on"),1100); }

function showFact(){
  cur=nextFact(); entry="";
  $("fact").textContent=cur.text+" ="; $("entry").innerHTML="&nbsp;"; $("entry").classList.remove("bad");
  factShownAt=performance.now();
}

/* damage scales with BOTH pace and streak */
function paceMult(sec){ return sec<=1.5?2.0 : sec<=3?1.5 : sec<=5?1.0 : 0.6; }
function comboMult(c){ return 1 + Math.min(c,10)*0.1; }   // up to 2x
function computeDamage(sec,c){ return Math.max(4, Math.round(10*paceMult(sec)*comboMult(c))); }

function spawnBoss(){
  phase="boss"; bossSpawnCount++;
  const idx=(bossSpawnCount-1)%4;
  boss={ idx, max:90+(bossSpawnCount-1)*40 }; boss.hp=boss.max;
  const r=$("rival");
  r.innerHTML = `<div class="bosshp"><div id="bosshp-fill"></div></div>`
    + `<div class="bosscharge"><div id="bosscharge-fill"></div></div>`
    + `<div class="bosslabel">KAIJU #${bossSpawnCount} · ${BOSS_NAMES[idx]}</div>`
    + bossSVG(idx);
  r.classList.remove("hidden","roar"); r.classList.remove("rise"); void r.offsetWidth; r.classList.add("rise");
  lastAnswerTs=performance.now();
  banner("KAIJU #"+bossSpawnCount+" APPROACHES!");
}
function updateBossHp(){ const f=$("bosshp-fill"); if(f) f.style.width=Math.max(0,100*boss.hp/boss.max)+"%"; }
function fireBeam(){ const b=$("beam"); b.classList.remove("on"); void b.offsetWidth; b.classList.add("on"); setTimeout(()=>b.classList.remove("on"),170); }
function hitRival(){ const r=$("rival"); r.classList.add("hit"); setTimeout(()=>r.classList.remove("hit"),180); }
function showDamage(d){
  const s=document.createElement("div"); s.className="dmg"; s.textContent="-"+d;
  s.style.right=(20+randInt(0,28))+"px"; s.style.bottom=(96+randInt(0,18))+"px";
  $("scene").appendChild(s); setTimeout(()=>s.remove(),720);
}
function roar(){ const r=$("rival"); r.classList.add("roar"); setTimeout(()=>r.classList.remove("roar"),300); banner("ROAR! Streak broken"); }
function defeatBoss(){
  bossesDefeated++; score += 50 + bossesDefeated*10; updateHud();
  banner("KAIJU DOWN! 💥");
  const r=$("rival"); r.innerHTML='<div style="font-size:60px;text-align:center;">💥</div>';
  setTimeout(()=>r.classList.add("hidden"),520);
  phase="city"; cityProgress=0; buildSkyline();
}

function tap(d){
  if(timeLeft<=0) return;
  const test=entry+d, ansStr=String(cur.ans);
  if(test===ansStr){
    const dt=performance.now()-factShownAt; totalSolveMs+=dt;
    correct++; smashed=correct; combo++; bestCombo=Math.max(bestCombo,combo);
    score += 10 + (combo-1)*2; updateHud();
    const hero=$("hero"); hero.classList.add("stomp"); setTimeout(()=>hero.classList.remove("stomp"),140);
    if(phase==="city"){
      smashNext(); cityProgress++;
      if(cityProgress>=NB) spawnBoss();
    } else {
      const dmg=computeDamage(dt/1000, combo);
      boss.hp-=dmg; fireBeam(); hitRival(); showDamage(dmg); lastAnswerTs=performance.now();
      if(boss.hp<=0) defeatBoss(); else updateBossHp();
    }
    showFact();
  } else if(ansStr.startsWith(test)){
    entry=test; $("entry").textContent=entry;
  } else {
    attempts++; combo=0; updateHud();
    const e=$("entry"); e.textContent=d; e.classList.add("bad"); entry="";
    setTimeout(()=>{ e.innerHTML="&nbsp;"; e.classList.remove("bad"); },260);
    return;
  }
  attempts++;
}
$("pad").querySelectorAll("button").forEach(b=> b.onclick=()=>tap(b.textContent));
document.addEventListener("keydown", e=>{ if(!$("game").classList.contains("hidden") && /^[0-9]$/.test(e.key)) tap(e.key); });

function start(){
  score=0; combo=0; bestCombo=0; smashed=0; correct=0; attempts=0; totalSolveMs=0; timeLeft=duration;
  phase="city"; cityProgress=0; boss=null; bossSpawnCount=0; bossesDefeated=0;
  updateHud(); $("time-left").textContent=duration; $("time-fill").style.width="100%";
  $("rival").classList.add("hidden");
  $("hero").innerHTML=heroSVG(); buildSkyline(); showFact();
  $("start").classList.add("hidden"); $("end").classList.add("hidden"); $("game").classList.remove("hidden"); $("best-banner").style.display="none";
  clearInterval(timer);
  const startTs=Date.now(); lastAnswerTs=performance.now();
  timer=setInterval(()=>{
    timeLeft=Math.max(0, duration-(Date.now()-startTs)/1000);
    $("time-left").textContent=Math.ceil(timeLeft); $("time-fill").style.width=(100*timeLeft/duration)+"%";
    if(phase==="boss"){
      const since=(performance.now()-lastAnswerTs)/1000, frac=Math.min(1,since/ATTACK_INTERVAL);
      const cf=$("bosscharge-fill"); if(cf) cf.style.width=(frac*100)+"%";
      if(frac>=1){ combo=0; updateHud(); roar(); lastAnswerTs=performance.now(); }
    }
    if(timeLeft<=0){ clearInterval(timer); endGame(); }
  },100);
}

function endGame(){
  $("game").classList.add("hidden"); $("end").classList.remove("hidden");
  const acc = attempts? Math.round(100*correct/attempts):0;
  const pace = correct ? Math.round((totalSolveMs/1000/correct)*10)/10 : null;
  $("e-correct").textContent=smashed; $("e-points").textContent=score;
  $("e-acc").textContent=acc+"%"; $("e-pace").textContent = pace!=null?pace:"–";
  $("streakline").textContent = `Best streak ×${bestCombo} 🔥 · Kaiju defeated: ${bossesDefeated}`;
  const isRecord = player==="jacob" && smashed > kaijuBest.smashed;
  $("newbest").classList.toggle("hidden", !isRecord);
  if(isRecord) kaijuBest={smashed, secsPerCorrect:pace};
  logResult(acc, pace);
}

function logResult(acc, pace){
  const note=$("save-note");
  if(player==="test"){ note.textContent="🧪 Test run — not saved."; return; }
  if(!CONFIG.logResults){ note.textContent="Saving turned off."; return; }
  const opLabel = op==="add"?"add":op==="sub"?"sub":"mixed";
  const payload={
    student:CONFIG.student, week:CONFIG.week, activity:ACTIVITY,
    mode:`${opLabel} ≤${range}, ${duration}s`,
    overall:`${smashed} smashed · ${bossesDefeated} kaiju`, percent:acc,
    addsub:`${correct}/${attempts}`, smashed:smashed, secsPerCorrect:(pace!=null?pace:""),
    num:"", mult:"", word:"", read:""
  };
  note.textContent="Saving result…";
  fetch(CONFIG.webAppUrl,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(payload)})
    .then(()=>note.textContent="✓ Result sent to your Sheet.")
    .catch(()=>note.textContent="Couldn't send — open this file in Safari/Chrome (not the preview) to save.");
}

$("go").onclick=start;
$("again").onclick=()=>{ $("best-banner").style.display=""; $("end").classList.add("hidden"); $("start").classList.remove("hidden"); renderBestBanner(); };
loadBest();
</script>
